name: Publish to Maven Central

on:
  push:
    tags:
      - 'release/v*'

env:
  ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_USERNAME }}
  ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_PASSWORD }}
  ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
  ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#release/v}"
          GRADLE_VERSION=$(grep "^VERSION=" gradle.properties | cut -d= -f2)
          [ "$TAG_VERSION" = "$GRADLE_VERSION" ] || (echo "Version mismatch: tag=$TAG_VERSION gradle=$GRADLE_VERSION" && exit 1)

      - name: Publish libraries
        run: ./gradlew publishAllPublicationsToMavenCentralRepository --no-configuration-cache

      - name: Publish settings plugin
        run: ./gradlew -p console-settings-plugin publishAllPublicationsToMavenCentralRepository --no-configuration-cache
